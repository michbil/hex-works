# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build main app
        run: |
          npm ci
          npm run dist

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Build beta app
        working-directory: ./beta
        run: |
          pnpm install --frozen-lockfile
          pnpm run export:web

      - name: Prepare deployment
        run: |
          # Copy beta build output into dist/beta/
          mkdir -p ./dist/beta
          cp -r ./beta/dist/* ./dist/beta/
          # Fix absolute asset paths for /beta/ subpath
          sed -i 's|src="/_expo/|src="_expo/|g' ./dist/beta/index.html
          sed -i 's|href="/_expo/|href="_expo/|g' ./dist/beta/index.html
          sed -i 's|href="/favicon|href="favicon|g' ./dist/beta/index.html
          # Inject Google Analytics
          sed -i 's|</head>|<!-- Google tag (gtag.js) --><script async src="https://www.googletagmanager.com/gtag/js?id=G-J99PMLML6S"></script><script>window.dataLayer=window.dataLayer\|\|[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-J99PMLML6S");</script>\n</head>|' ./dist/beta/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist/"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build main app
        run: |
          npm ci
          npm run dist

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Build beta app
        working-directory: ./beta
        run: |
          pnpm install --frozen-lockfile
          pnpm run export:web

      - name: Prepare beta output
        run: |
          mkdir -p ./dist/beta
          cp -r ./beta/dist/* ./dist/beta/
          sed -i 's|src="/_expo/|src="_expo/|g' ./dist/beta/index.html
          sed -i 's|href="/_expo/|href="_expo/|g' ./dist/beta/index.html
          sed -i 's|href="/favicon|href="favicon|g' ./dist/beta/index.html

      - name: Deploy preview to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: pr/${{ github.event.pull_request.number }}
          publish_branch: gh-pages
          keep_files: true

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          message: |
            ### Preview deployed!
            - Legacy app: https://${{ github.repository_owner }}.github.io/hex-works/pr/${{ github.event.pull_request.number }}/
            - Beta app: https://${{ github.repository_owner }}.github.io/hex-works/pr/${{ github.event.pull_request.number }}/beta/
